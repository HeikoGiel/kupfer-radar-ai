name: Kupfer-Daten stündlich aktualisieren

# Wann soll das Skript laufen?
on:
  schedule:
    - cron: '0 * * * *' # Zu jeder vollen Stunde (08:00, 09:00, etc.)
  workflow_dispatch: # Erlaubt es dir, das Skript auch manuell per Button zu starten

jobs:
  update-datenbank:
    runs-on: ubuntu-latest # Wir mieten uns für 1 Minute einen kostenlosen Linux-Server

    steps:
      - name: Code aus dem Repository holen
        uses: actions/checkout@v4

      - name: Python 3.12 installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Daten-Arbeiter Skript ausführen
        env:
          DB_URI: ${{ secrets.DB_URI }} # Hier zieht sich der Server den geheimen Zettel
        run: python daten_arbeiter.py
